<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>html,body{margin:0;background:transparent}canvas{display:block}</style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.184.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.184.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { MeshoptDecoder } from 'three/addons/libs/meshopt_decoder.module.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

const SIZE = 512;
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(2);
renderer.setSize(SIZE, SIZE);
renderer.setClearColor(0x000000, 0);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, 1, 0.01, 1000);

scene.add(new THREE.HemisphereLight(0xfff5e0, 0x1a0f08, 0.55));
const k = new THREE.DirectionalLight(0xffffff, 1.2); k.position.set(5,8,5); scene.add(k);
const f = new THREE.DirectionalLight(0xb87333, 0.45); f.position.set(-4,-2,-3); scene.add(f);
const r = new THREE.DirectionalLight(0xfff5e0, 0.3); r.position.set(0,-3,4); scene.add(r);

const loader = new GLTFLoader();
loader.setMeshoptDecoder(MeshoptDecoder);
const draco = new DRACOLoader();
draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
loader.setDRACOLoader(draco);

window.captureModel = (url) => new Promise((resolve, reject) => {
  loader.load(url, (gltf) => {
    // Clear previous root
    while (scene.children.length > 4) scene.remove(scene.children[4]);
    const root = gltf.scene;
    const box = new THREE.Box3().setFromObject(root);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    root.position.set(-center.x, -center.y, -center.z);
    const maxDim = Math.max(size.x, size.y, size.z);
    const dist = maxDim * 2.4;
    camera.position.set(dist, dist * 0.6, dist);
    camera.lookAt(0, 0, 0);
    camera.near = dist / 100; camera.far = dist * 10; camera.updateProjectionMatrix();
    scene.add(root);
    renderer.render(scene, camera);
    resolve(renderer.domElement.toDataURL('image/png'));
  }, undefined, reject);
});
window.__ready = true;
</script>
</body>
</html>
